<!DOCTYPE html>
<html lang='en'>
<head>
    <title>MOM's Kitchen</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .nav{
            width: 100%;
            height: 4rem;
            background-color: rgba(29, 27, 27, 0.808);
            position: fixed;
            top: -1px;
        }
        .nav ul{
            list-style: none;
            display: flex;
            position: absolute;
            left: 35%;
            top: 13px;
        }
        .nav ul li a{
            margin-left: 25px;
            font-size: 23px;
            text-decoration: none;
            color: rgb(255, 255, 255);
            transition: 0.50s;
            font-family: algerian;
        }
        .nav ul li a:hover{
            color: rgb(251, 194, 86);
        }
        .nav #btn-table{
            height: 45px;
            border-radius: 40px;
            position: absolute;
            right: 3%;
            top: 10px;
            font-weight: 700;
        }
        .nav #btn-table a{
            color: orange;
            text-decoration: none;
        }
        .nav #btn-table a:hover{
            color: black;
        }
        .nav h4{
            font-weight: 900;
            color: rgb(241, 174, 49);
            font-family: normal;
            margin-top: 0.60%;
            margin-left: 1%;
            margin-top: 1%;
        }
        .nav h4 span{
            color: white;
        }
        .contect{
            margin-top: 10%;
            width: 100%;
            height: 36rem;
            display: flex;
        }
        .feedback{
            width: 60%;
            color: orange;
            height: 35.60rem;
            border: 3px solid orange;
            border-radius: 10px;
            margin-left: 1%;
            margin-right: 1%;
        }
        .feed{
            width: 80%;
            height: 4rem;
            margin-top: 2%;
            margin-left: 10%;
            border-radius: 10px;
            border: 2px solid orange;
            font-weight: 800;
            color: orange;
            font-size: 20px;
        }
        .feed1{
            width: 80%;
            height: 4rem;
            margin-top: 2%;
            margin-left: 10%;
            border-radius: 10px;
            border: 2px solid orange;
            background-color: rgb(255, 188, 62);
            font-weight: 800;
            color: rgb(255, 255, 255);
            transition:1s ease-in-out;
            font-size: 23px;
            font-style: italic;
        }
        .feed1:hover{
            color:rgb(255, 192, 74);
            background-color: white;
        }
        .profile{
            width: 60%;
            height: 35rem;
        }
        .profile img{
            width: 100%;
            height: 35.60rem;
            border-radius: 10px;
            margin-left: 1px;
        }
        h3{
            position: absolute;
            top: 13%;
            left: 41%;
            font-weight: 800;
            color: orange;
        }
    </style>
</head>
<body>
     <div class="nav">
        <h4>🥣<span>MOM's</span> Kitchen </h4>
        <ul>
            <li><a href="MOMS_Ketchen.html">Home</a></li>
            <li><a href="MOMS_Ketchen_About.html">About</a></li>
            <li><a href="MOMS_Ketchen_manu.html">Menu</a></li>
            <li><a href="MOMS_Ketchen_Contect.html">Contact</a></li>
        </ul>     
            <button class="btn btn-outline-warning" id="btn-table"><a href="MOMS_Ketchen_Book_table.html">BOOK TABLE</a></button>
    </div>
    <h3><i><u>RESERVE A TABLE</u></i></h3>
     <div class="contect">
         <div class="profile">
            <img src="Shef.png">
        </div>
        <div class="feedback">
            <input type="text" class="feed" placeholder="Your Name"><br>
            <input type="Email" class="feed" placeholder="Your Email"><br>
            <input type="text" class="feed" placeholder="PHONE"><br>
            <input type="datetime" class="feed" placeholder="TIME & DATE"><br>
            <input type="text" class="feed" placeholder="RESERVATION TYPE"><br>
            <input type="textarea" class="feed" placeholder="Send Message"><br>
            <button type="submit" class="feed1">Send Message</button>
        </div>
    </div>
</body>
</html>
